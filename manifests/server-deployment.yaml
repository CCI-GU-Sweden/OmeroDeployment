kind: Deployment
apiVersion: apps/v1
metadata:
  name: omero-server
  labels:
    app: omero-server
    app.kubernetes.io/component: omero-server
    app.kubernetes.io/instance: omero-server
    app.kubernetes.io/name: omero-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omero-server
  template:
    metadata:
      labels:
        app: omero-server      
    spec:
      volumes:
        - name: omero
          persistentVolumeClaim:
            claimName: omero
        - name: cap-omero
          persistentVolumeClaim:
            claimName: cap-omero
        - name: opt-omero
          persistentVolumeClaim:
            claimName: opt-omero
        - name: 60-db
          configMap: 
            name: 60-db-cf
            defaultMode: 493
      initContainers:
        - name: init-copy
          image: registry.k8s.gu.se/openshift/omero-server:1.3
          command: ["/bin/bash","-c"]
          args: 
              - |
                #/bin/sh              
                mkdir -p /mnt/opt
                mkdir -p /mnt/cap
                cp -rn /opt/omero/server/OMERO.server/* /mnt/opt
                cp -rn /OMERO/D* /mnt/cap
                cp -rn /OMERO/F* /mnt/cap
                cp -rn /OMERO/Man* /mnt/cap
                cp -rn /OMERO/Pix* /mnt/cap
                cp -rn /OMERO/Thu* /mnt/cap
          volumeMounts:
            - name: opt-omero
              mountPath: /mnt/opt
            - name: cap-omero
              mountPath: /mnt/cap
      containers:
        - resources: {}
          terminationMessagePath: /dev/termination-log
          name: omero-server
          env:
            - name: CONFIG_omero_db_user
              value: omero
            - name: CONFIG_omero_db_pass
              value: nt4suger
            - name: CONFIG_omero_db_host
              value: omero-postgres-server
            - name: CONFIG_omero_db_name
              value: omerodb
            - name: ROOTPASS
              value: hejhej123
            - name: CONFIG_omero_Ice_IPv6
              value: '0'
          ports:
            - containerPort: 4063
              protocol: TCP
            - containerPort: 4064
              protocol: TCP
          imagePullPolicy: Always
          volumeMounts:
            - name: omero
              mountPath: /omero
            - name: cap-omero
              mountPath: /OMERO
            - name: opt-omero
              mountPath: /opt/omero/server/OMERO.server
            - name: 60-db
              mountPath: /startup/60-database.sh
              subPath: 60-database.sh
          terminationMessagePolicy: File
          image: registry.k8s.gu.se/openshift/omero-server:1.3
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600

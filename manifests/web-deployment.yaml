apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  labels:
    app: omero-web
    app.kubernetes.io/component: omero-web
    app.kubernetes.io/instance: omero-web
    app.kubernetes.io/name: omero-web
  name: omero-web
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: omero-web
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: omero-web        
    spec:
      containers:
      - env:
        - name: CONFIG_omero_web_server__list
          value: '[["omero", 4064, "omero"]]'
        - name: CONFIG_omero_web_static_url
          value: /static/
        - name: CONFIG_omero_web_debug
          value: "true"
        - name: CONFIG_omero.web.cors_origin_allow_all
          value: "true"
        image: registry.k8s.gu.se/openshift/omero-web:1.9
        imagePullPolicy: Always
        name: omero-web
        ports:
        - containerPort: 4080
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /opt/omero/web/
          name: opt-omero-web
        - mountPath: /omero
          name: omero-web
        - mountPath: /opt/omero/web/config/omeroweb-config.omero
          name: omeroweb-config-omero
          subPath: omeroweb-config.omero
        - mountPath: /startup/50-config.py
          name: 50-config-py
          subPath: 50-config.py
        - mountPath: /opt/omero/web/OMERO.web/var/django_secret_key
          name: django-secret-key
          subPath: django_secret_key
      dnsPolicy: ClusterFirst
      initContainers:
      - command:
        - sh
        - -c
        - cp -rn /build_tmp2/* /opt/omero/web/
        image: registry.k8s.gu.se/openshift/omero-web:1.9
        imagePullPolicy: IfNotPresent
        name: init-copy-files
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /opt/omero/web/
          name: opt-omero-web
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: opt-omero-web
        persistentVolumeClaim:
          claimName: opt-omero-web
      - name: omero-web
        persistentVolumeClaim:
          claimName: omero-web
      - configMap:
          defaultMode: 493
          name: omeroweb-config.omero
        name: omeroweb-config-omero
      - configMap:
          defaultMode: 493
          name: 50-config.py
        name: 50-config-py
      - name: django-secret-key
        secret:
          defaultMode: 420
          secretName: django-secret-key

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: flask-app
  name: flask-app
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: flask-app
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: flask-app
        deployment: flask-app
    spec:
      containers:
      - image: registry.k8s.gu.se/openshift/omero-flask:v0.7
        imagePullPolicy: Always
        name: flask-app
        env:
          - name: JAVA_OPTS
            value: "-Djava.util.prefs.userRoot=/omero/userPrefs -Djava.util.prefs.systemRoot=/omero/systemPrefs"  
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
          - name: config-py
            mountPath: /app/omero/config.py
            subPath: config.py
          - name: slash-omero
            mountPath: /omero
          - name: upload
            mountPath: /app/omero/uploads
#            defaultMode: 511
          - name: logs
            mountPath: /app/omero/logs
          - name: slash-cache
            mountPath: /.cache
      volumes:
        - name: config-py
          configMap:
            name: config.py
        - name: slash-omero
          persistentVolumeClaim:
            claimName: flask-slash-omero
        - name: logs
          persistentVolumeClaim:
            claimName: flask-logs
        - name: upload
          persistentVolumeClaim:
            claimName: flask-upload
        - name: slash-cache
          persistentVolumeClaim:
            claimName: flask-slash-cache
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30


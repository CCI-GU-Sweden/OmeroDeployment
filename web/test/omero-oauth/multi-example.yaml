---
# oauth section names must match [a-z][a-z0-9]+

providers:

  ######################################################################
  # Adfs OpenID
  - name: adfs
    displayname: Adfs
    url:
      # These 3 URLs will be found using OpenID discovery, uncomment to override
      authorisation: 
      token: 
      userinfo: 
      callback: https://URL/oauth/callback/adfs

    # https://console.developers.google.com/apis/credentials
    client:
      id: 
      secret: 
      scopes:
        - openid
        - profile
        - email

    openid:
      # OpenID issuer, required for auto-discovery
      issuer: https://accounts.google.com
      # Uncomment to enable verification
      #verify: true

    # force to always make user click authorize
    #authorization:
      #params:
        #prompt: select_account

    userinfo:
      type: openid

    user:
      # OMERO user name, template must contain {sub}
      name: '{email}'
      email: '{email}'
      firstname: '{given_name}'
      lastname: '{family_name}'



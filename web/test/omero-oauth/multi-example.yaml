---
# oauth section names must match [a-z][a-z0-9]+

providers:

  ######################################################################
  # Adfs OpenID
  - name: adfs
    displayname: Adfs
    url:
      # These 3 URLs will be found using OpenID discovery, uncomment to override
      authorisation: https://idptest.it.gu.se/adfs/oauth2/authorize
      token: https://idptest.it.gu.se/adfs/oauth2/token
      userinfo: https://idptest.it.gu.se/adfs/userinfo
      callback: https://omero-web-cci-omero-dev.apps.k8s.gu.se/oauth/callback/adfs

    # https://console.developers.google.com/apis/credentials
    client:
      id: ebe8036c-2c77-426a-8495-3ff9610e4c59
      secret: Dx6Cg0ffMw93Mi2JmysohTrWcBhMk7mM9k3FVPsi
      scopes:
        - openid
        - profile
        - email

    openid:
      # OpenID issuer, required for auto-discovery
      issuer: https://accounts.google.com
      # Uncomment to enable verification
      #verify: true

    # force to always make user click authorize
    #authorization:
      #params:
        #prompt: select_account

    userinfo:
      type: openid

    user:
      # OMERO user name, template must contain {sub}
      name: '{email}'
      email: '{email}'
      firstname: '{given_name}'
      lastname: '{family_name}'



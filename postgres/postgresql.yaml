---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: omero-postgresql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi 
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: omero-postgres-server
  name: omero-postgres-server
spec:
  ports:
  - port: 5432
    protocol: TCP
    targetPort: 5432
  selector:
    app: omero-postgres-server
status:
  loadBalancer: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init-script
data:
  init.sql: |
      -- Create the additional database and user
      CREATE DATABASE omerodb;
      CREATE USER omero WITH ENCRYPTED PASSWORD 'nt4suger'; 
      GRANT ALL PRIVILEGES ON DATABASE omerodb TO omero;
--- 
kind: Deployment
apiVersion: apps/v1
metadata:
  name: omero-postgres-server
  labels:
    app: omero-postgres-server    
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omero-postgres-server
  template:
    metadata:      
      labels:
        app: omero-postgres-server
    spec:
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: omero-postgresql-pvc   
      containers:
        - name: postgresql
          resources: {}
          image: registry.redhat.io/rhel9/postgresql-15
          ports: 
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRESQL_DATABASE
              value: omerodb
            - name: POSTGRESQL_USER
              value: omero
            - name: POSTGRESQL_PASSWORD
              value: nt4suger
            - name: POSTGRESQL_ADMIN_PASSWORD
              value: nt4suger
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/pgsql/data          
          terminationMessagePath: /dev/termination-log    
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600


